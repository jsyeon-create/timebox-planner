<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeBox Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module">
// ── Firebase 초기화 ──────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhehWIHjoX6GMrWMi_6u9H1pg0s2_2Exc",
  authDomain: "timeplanner-6b076.firebaseapp.com",
  projectId: "timeplanner-6b076",
  storageBucket: "timeplanner-6b076.firebasestorage.app",
  messagingSenderId: "906669423036",
  appId: "1:906669423036:web:0d79ede12a30b38a40d3b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const dataRef = doc(db, "timebox", "main");

// Firestore → 전역 캐시
window._fsCache = null;
window._fsDirty = false;

window.fsLoadAll = async function() {
  if (window._fsCache) return window._fsCache;
  try {
    const snap = await getDoc(dataRef);
    window._fsCache = snap.exists() ? (snap.data().days || {}) : {};
  } catch(e) {
    window._fsCache = {};
  }
  return window._fsCache;
};

window.fsSaveAll = async function(data) {
  window._fsCache = data;
  try {
    await setDoc(dataRef, { days: data });
  } catch(e) {
    console.error("Firestore 저장 실패", e);
  }
};

// 앱 초기화는 Firestore 로드 후에 실행
window.addEventListener('DOMContentLoaded', async () => {
  await window.fsLoadAll();
  window._appReady = true;
  if (window._initApp) window._initApp();
});
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F2EC;
  --paper: #FDFAF5;
  --ink: #1A1714;
  --ink-faint: #8A857D;
  --ink-lighter: #C4BFB5;
  --accent: #C8521A;
  --accent-light: #F2E8E0;
  --line: #E8E3DA;
  --done-bg: #EDF2EB;
  --done-line: #7A9E72;
  --shadow: rgba(26,23,20,0.07);
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 36px 20px 80px;
}

/* ── Header ── */
header {
  max-width: 820px;
  margin: 0 auto 28px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.logo-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 500;
}
.logo-title {
  font-family: 'DM Serif Display', serif;
  font-size: 30px;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.02em;
  margin-top: 2px;
}

/* ── Date nav ── */
.date-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1.5px solid var(--line);
  background: var(--paper);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint);
  font-size: 16px;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--ink); color: var(--ink); }
.date-display {
  text-align: center;
  cursor: pointer;
}
.date-big {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--ink);
  line-height: 1;
}
.date-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  margin-top: 2px;
  letter-spacing: 0.06em;
}
.today-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--accent);
  background: var(--accent-light);
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.08em;
  font-weight: 500;
  display: inline-block;
  margin-top: 3px;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.icon-btn {
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 7px 12px;
  border-radius: 7px;
  border: 1.5px solid var(--line);
  background: var(--paper);
  color: var(--ink-faint);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.icon-btn:hover { border-color: var(--ink); color: var(--ink); }
.icon-btn.primary {
  background: var(--ink);
  border-color: var(--ink);
  color: white;
}
.icon-btn.primary:hover { background: var(--accent); border-color: var(--accent); }

/* ── Stats ── */
.stats {
  max-width: 820px;
  margin: 0 auto 20px;
  display: flex;
  gap: 1px;
  background: var(--line);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.stat {
  flex: 1;
  background: var(--paper);
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
}
.stat-value {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--ink);
  line-height: 1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.done   { color: var(--done-line); }

/* Progress */
.progress-wrap {
  max-width: 820px;
  margin: 0 auto 24px;
}
.progress-bar {
  height: 3px;
  background: var(--line);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #E8793C);
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}
.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  margin-top: 5px;
  display: flex;
  justify-content: space-between;
}

/* ── Main layout ── */
.main {
  max-width: 820px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 248px;
  gap: 18px;
  align-items: start;
}

/* ── Timeline card ── */
.timeline-card {
  background: var(--paper);
  border-radius: 14px;
  border: 1px solid var(--line);
  overflow: hidden;
  box-shadow: 0 2px 12px var(--shadow);
}
.timeline-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.timeline-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  font-weight: 400;
}
.btn-add {
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-light);
  border: none;
  border-radius: 6px;
  padding: 6px 11px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.04em;
}
.btn-add:hover { background: #EADCD3; transform: translateY(-1px); }

/* ── Block rows ── */
.blocks-list { padding: 6px 0; }

.block-row {
  display: grid;
  grid-template-columns: 52px 1fr;
  min-height: 50px;
  border-bottom: 1px solid var(--line);
  transition: background 0.15s;
  position: relative;
}
.block-row:last-child { border-bottom: none; }
.block-row:hover { background: rgba(26,23,20,0.02); }
.block-row.is-done { background: var(--done-bg); }
.block-row.is-active { background: #FFF8F4; }
.block-row.is-active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.block-time {
  padding: 13px 0 13px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  line-height: 1.5;
  display: flex; flex-direction: column; gap: 1px;
  user-select: none;
}
.block-time .hour { color: var(--ink); font-weight: 500; font-size: 11px; }

/* actual time row inside block */
.actual-time-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--line);
}
.actual-time-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--ink-lighter);
  text-transform: uppercase;
  flex-shrink: 0;
}
.actual-time-val {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--done-line);
  font-weight: 500;
}
.actual-time-diff {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink-lighter);
  margin-left: 2px;
}
.actual-time-diff.over  { color: #C0392B; }
.actual-time-diff.under { color: var(--done-line); }

/* modal section divider */
.modal-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  padding: 10px 0 6px;
  border-top: 1px dashed var(--line);
  margin-top: 4px;
}
.modal-section-label.actual { color: var(--done-line); }

.block-content {
  padding: 9px 12px 9px 8px;
  display: flex;
  align-items: flex-start;
  gap: 9px;
}
.block-check {
  width: 17px; height: 17px;
  border-radius: 4px;
  border: 1.5px solid var(--ink-lighter);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 3px;
  appearance: none;
  -webkit-appearance: none;
  position: relative;
  transition: border-color 0.15s, background 0.15s;
}
.block-check:checked { background: var(--done-line); border-color: var(--done-line); }
.block-check:checked::after {
  content: '';
  width: 4px; height: 7px;
  border: 2px solid white;
  border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px,-1px);
  position: absolute;
}

.block-body { flex: 1; min-width: 0; }
.block-title {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.35;
  margin-bottom: 3px;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.is-done .block-title {
  color: var(--ink-faint);
  text-decoration: line-through;
  text-decoration-color: var(--done-line);
}
.block-meta { display: flex; gap: 7px; align-items: center; }
.tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
  text-transform: uppercase;
}
.tag-work    { background: #E8EEF8; color: #3A5FA0; }
.tag-health  { background: #EBF5E8; color: #3A7A32; }
.tag-personal{ background: #F5EBF8; color: #7A3AA0; }
.tag-focus   { background: #FEF5E0; color: #A07A20; }
.tag-break   { background: #F0F0F0; color: #606060; }
.duration {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-lighter);
}

.block-actions {
  display: flex; gap: 2px;
  opacity: 0;
  transition: opacity 0.15s;
  margin-left: auto;
  align-self: center;
  flex-shrink: 0;
}
.block-row:hover .block-actions { opacity: 1; }
.action-btn {
  width: 25px; height: 25px;
  border-radius: 5px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint);
  font-size: 13px;
  transition: background 0.12s, color 0.12s;
}
.action-btn:hover { background: var(--line); color: var(--ink); }
.action-btn.edit:hover { background: var(--accent-light); color: var(--accent); }
.action-btn.del:hover { background: #FDE8E4; color: #C0392B; }

.empty-state {
  padding: 36px 20px;
  text-align: center;
  color: var(--ink-lighter);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.06em;
}

/* ── Sidebar ── */
.sidebar { display: flex; flex-direction: column; gap: 14px; }

.side-card {
  background: var(--paper);
  border-radius: 14px;
  border: 1px solid var(--line);
  box-shadow: 0 2px 12px var(--shadow);
  overflow: hidden;
}
.side-card-header {
  padding: 13px 16px 9px;
  border-bottom: 1px solid var(--line);
  font-family: 'DM Serif Display', serif;
  font-size: 14px;
  font-weight: 400;
}
.side-card-body { padding: 13px 16px; }

/* Focus now */
.focus-now {
  background: var(--accent-light);
  border-radius: 8px;
  padding: 11px 13px;
  border-left: 3px solid var(--accent);
}
.focus-now-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.focus-now-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.focus-now-time {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  margin-top: 2px;
}

/* Timer */
.timer-display { text-align: center; padding: 4px 0; }
.timer-digits {
  font-family: 'DM Mono', monospace;
  font-size: 36px;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.05em;
  line-height: 1;
}
.timer-digits span { color: var(--accent); }
.timer-digits.running { color: var(--accent); }
.timer-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink-lighter);
  margin-top: 4px;
  letter-spacing: 0.1em;
}
.timer-presets {
  display: flex; gap: 5px; margin-bottom: 10px; justify-content: center;
}
.timer-preset {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  padding: 4px 9px; border-radius: 5px;
  border: 1.5px solid var(--line);
  background: transparent; color: var(--ink-faint);
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.03em;
}
.timer-preset:hover { border-color: var(--ink); color: var(--ink); }
.timer-preset.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.timer-custom-row {
  display: flex; align-items: center; gap: 6px;
  justify-content: center; margin-bottom: 6px;
}
.timer-custom-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--ink-faint); letter-spacing: 0.06em;
}
.timer-custom-input {
  width: 48px; padding: 4px 6px;
  border: 1.5px solid var(--line); border-radius: 6px;
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  color: var(--ink); background: white; outline: none;
  text-align: center; transition: border-color 0.15s;
}
.timer-custom-input:focus { border-color: var(--accent); }
.timer-custom-unit {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--ink-faint);
}
.timer-btns { display: flex; gap: 7px; margin-top: 8px; }
.timer-btn {
  flex: 1; padding: 8px; border-radius: 7px;
  border: 1.5px solid var(--line);
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  cursor: pointer; background: transparent; color: var(--ink-faint);
  transition: all 0.15s; letter-spacing: 0.04em;
}
.timer-btn.primary { background: var(--ink); border-color: var(--ink); color: white; }
.timer-btn:hover { border-color: var(--ink); color: var(--ink); }
.timer-btn.primary:hover { background: #333; }

/* Mood */
.mood-row { display: flex; gap: 6px; justify-content: center; padding: 2px 0 4px; }
.mood-btn {
  font-size: 20px;
  background: none;
  border: 2px solid transparent;
  border-radius: 7px;
  cursor: pointer;
  padding: 4px 5px;
  transition: border-color 0.12s, transform 0.12s, background 0.12s;
}
.mood-btn:hover { transform: scale(1.15); }
.mood-btn.selected { border-color: var(--accent); background: var(--accent-light); }

/* Notes */
.notes-area {
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  color: var(--ink);
  background: transparent;
  line-height: 1.7;
  min-height: 80px;
}

/* ── History panel ── */
.history-panel {
  max-width: 820px;
  margin: 20px auto 0;
  background: var(--paper);
  border-radius: 14px;
  border: 1px solid var(--line);
  box-shadow: 0 2px 12px var(--shadow);
  overflow: hidden;
}
.history-header {
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.history-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 10px;
}
.history-toggle { color: var(--ink-faint); font-size: 12px; transition: transform 0.2s; }
.history-toggle.open { transform: rotate(180deg); }
.history-body { display: none; padding: 16px 20px; }
.history-body.open { display: block; }

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.history-day {
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
  background: white;
}
.history-day:hover { border-color: var(--accent); transform: translateY(-1px); }
.history-day-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.history-day-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 6px;
}
.history-day-bar {
  height: 3px;
  background: var(--line);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 5px;
}
.history-day-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--done-line), #A8D4A0);
  border-radius: 99px;
}
.history-day-pct {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
}
.history-empty {
  color: var(--ink-lighter);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 20px 0;
  text-align: center;
  letter-spacing: 0.06em;
}

/* ── Modals ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,23,20,0.35);
  backdrop-filter: blur(3px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--paper);
  border-radius: 16px;
  padding: 26px;
  width: 100%;
  max-width: 380px;
  margin: 20px;
  box-shadow: 0 20px 60px rgba(26,23,20,0.18);
  animation: modal-in 0.2s cubic-bezier(.4,0,.2,1);
}
@keyframes modal-in {
  from { opacity:0; transform: scale(0.95) translateY(8px); }
  to   { opacity:1; transform: none; }
}
.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  font-weight: 400;
  margin-bottom: 18px;
}
.form-group { margin-bottom: 12px; }
.form-label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.form-input, .form-select {
  width: 100%;
  padding: 9px 11px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  color: var(--ink);
  background: white;
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-cancel {
  flex: 1; padding: 9px;
  border-radius: 8px;
  border: 1.5px solid var(--line);
  font-family: 'DM Mono', monospace; font-size: 11px;
  background: transparent; color: var(--ink-faint);
  cursor: pointer; transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--ink); color: var(--ink); }
.btn-save {
  flex: 2; padding: 9px;
  border-radius: 8px; border: none;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  background: var(--ink); color: white;
  cursor: pointer; transition: background 0.15s; letter-spacing: 0.04em;
}
.btn-save:hover { background: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--ink); color: white;
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 10px 20px; border-radius: 8px;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
  opacity: 0; z-index: 200; white-space: nowrap;
  letter-spacing: 0.04em;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

@media (max-width: 640px) {
  .main { grid-template-columns: 1fr; }
  .header-actions .icon-btn span { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-label">Daily Planner</div>
    <div class="logo-title">TimeBox</div>
  </div>

  <div class="date-nav">
    <button class="nav-btn" onclick="changeDay(-1)" title="이전 날">‹</button>
    <div class="date-display" onclick="goToday()" title="오늘로">
      <div class="date-big" id="dateBig"></div>
      <div class="date-sub" id="dateSub"></div>

    </div>

  <div class="header-actions">

      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>불러오기</span>

    </label>
    <button class="icon-btn" onclick="exportJSON()" title="JSON 내보내기">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 8V1M3 4L6 1l3 3M1 10h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>내보내기</span>
    </button>
    <button class="icon-btn primary" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>블록 추가</span>
    </button>
  </div>
</header>

<div class="stats">
  <div class="stat"><span class="stat-label">Total</span><span class="stat-value" id="statTotal">0</span></div>
  <div class="stat"><span class="stat-label">Done</span><span class="stat-value done" id="statDone">0</span></div>
  <div class="stat"><span class="stat-label">Remaining</span><span class="stat-value accent" id="statLeft">0</span></div>
  <div class="stat"><span class="stat-label">Focus</span><span class="stat-value" id="statFocus">0h</span></div>
</div>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span>달성률</span><span id="progressPct">0%</span></div>
</div>

<div class="main">
  <div class="timeline-card">
    <div class="timeline-header">
      <h2>타임라인</h2>
      <button class="btn-add" onclick="openModal()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        블록 추가

    <div class="blocks-list" id="blocksList"></div>

  <div class="sidebar">
    <div class="side-card">
      <div class="side-card-header">지금 집중 중</div>
      <div class="side-card-body">
        <div class="focus-now" id="focusNow">
          <div class="focus-now-label" id="focusLabel">▶ Now</div>

    </div>

    <div class="side-card">
      <div class="side-card-header">포모도로 타이머</div>
      <div class="side-card-body">
        <div class="timer-presets">
          <button class="timer-preset active" onclick="setPreset(this,25)">25</button>
          <button class="timer-preset" onclick="setPreset(this,50)">50</button>
          <button class="timer-preset" onclick="setPreset(this,90)">90</button>
        </div>
        <div class="timer-custom-row">
          <span class="timer-custom-label">직접 입력</span>
          <input class="timer-custom-input" id="timerCustom" type="number" min="1" max="999" value="25" oninput="setCustom(this.value)">
          <span class="timer-custom-unit">분</span>
        </div>
        <div class="timer-display">
          <div class="timer-digits" id="timerDigits">25<span>:00</span></div>
          <div class="timer-label" id="timerLabel">POMODORO</div>
        </div>
        <div class="timer-btns">
          <button class="timer-btn primary" id="timerBtn" onclick="toggleTimer()">START</button>
          <button class="timer-btn" onclick="resetTimer()">RESET</button>

    <div class="side-card">

      <div class="side-card-body">

          <button class="mood-btn" onclick="setMood(this,'😴')">😴</button>
          <button class="mood-btn" onclick="setMood(this,'😐')">😐</button>
          <button class="mood-btn" onclick="setMood(this,'🙂')">🙂</button>
          <button class="mood-btn" onclick="setMood(this,'😊')">😊</button>
          <button class="mood-btn" onclick="setMood(this,'🔥')">🔥</button>

    </div>

    <div class="side-card">
      <div class="side-card-header">메모</div>
      <div class="side-card-body">
        <textarea class="notes-area" placeholder="오늘의 목표, 아이디어..." id="notesArea" oninput="saveNotes()"></textarea>
      </div>

</div>

<!-- History -->
<div class="history-panel">
  <div class="history-header" onclick="toggleHistory()">
    <h2>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M7 4v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      히스토리
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-faint)" id="historyCount"></span>
    </h2>
    <span class="history-toggle" id="historyToggle">▼</span>
  </div>
  <div class="history-body" id="historyBody"></div>
</div>

<!-- Add Block Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>새 타임박스</h3>
    <div class="form-group">
      <label class="form-label">할 일</label>
      <input class="form-input" id="inpTitle" type="text" placeholder="이 시간에 할 일을 입력하세요">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">시작 시간</label>
        <input class="form-input" id="inpStart" type="time" value="09:00">
      </div>
      <div class="form-group">
        <label class="form-label">종료 시간</label>
        <input class="form-input" id="inpEnd" type="time" value="10:00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select class="form-select" id="inpTag">
        <option value="work">💼 업무</option>
        <option value="focus">🎯 집중</option>
        <option value="health">🌿 건강</option>
        <option value="personal">✦ 개인</option>
        <option value="break">☕ 휴식</option>
      </select>
    </div>
    <div class="modal-section-label actual">실제 진행 시간 (선택)</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">실제 시작</label>
        <input class="form-input" id="inpActualStart" type="time" placeholder="—">
      </div>
      <div class="form-group">
        <label class="form-label">실제 종료</label>
        <input class="form-input" id="inpActualEnd" type="time" placeholder="—">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveBlock()">추가하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Storage keys ──────────────────────────────────────────────────────────────
const STORE_KEY = 'timebox_v2';

function loadAll() {
  // Firestore 캐시에서 동기 반환 (fsLoadAll()로 미리 로드됨)
  return window._fsCache || {};
}
function saveAll(data) {
  window._fsCache = data;
  // 비동기 저장 (UI 블로킹 없이)
  window.fsSaveAll(data);
}

// ── Date state ────────────────────────────────────────────────────────────────
let nextId = Date.now();

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function keyToDate(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isWeekend(d) { const day = d.getDay(); return day === 0 || day === 6; }

function nearestWeekday(d, preferForward) {
  const day = d.getDay();
  if (day === 0) d.setDate(d.getDate() + (preferForward ? 1 : -2));
  else if (day === 6) d.setDate(d.getDate() + (preferForward ? 2 : -1));
  return d;
}

// 오늘이 주말이면 가장 가까운 평일(금요일)로 시작
const _initDate = nearestWeekday(new Date(), false);
let viewDate = dateToKey(_initDate);

function changeDay(delta) {
  const d = keyToDate(viewDate);
  let steps = Math.abs(delta);
  const dir = delta > 0 ? 1 : -1;
  while (steps > 0) {
    d.setDate(d.getDate() + dir);
    if (!isWeekend(d)) steps--;
  }
  viewDate = dateToKey(d);
  renderAll();
}
function goToday() {
  const d = nearestWeekday(new Date(), false);
  viewDate = dateToKey(d);
  renderAll();
}

// ── Day data helpers ──────────────────────────────────────────────────────────
function getDayData(key) {
  const all = loadAll();
  return all[key] || { blocks: [], notes: '', mood: null };
}
function setDayData(key, data) {
  const all = loadAll();
  all[key] = data;
  saveAll(all);
}

function getCurrentBlocks() { return getDayData(viewDate).blocks; }
function saveBlocks(blocks) {
  const d = getDayData(viewDate);
  d.blocks = blocks;
  setDayData(viewDate, d);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const tagMap = {
  work:    { cls:'tag-work',     label:'업무' },
  focus:   { cls:'tag-focus',   label:'집중' },
  health:  { cls:'tag-health',  label:'건강' },
  personal:{ cls:'tag-personal',label:'개인' },
  break:   { cls:'tag-break',   label:'휴식' },
};
const DAYS = ['일','월','화','수','목','금','토'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function timeToMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function formatDuration(s,e) {
  const d = timeToMin(e)-timeToMin(s);
  if(d<=0) return '';
  const h=Math.floor(d/60), m=d%60;
  return h>0?(m>0?`${h}h ${m}m`:`${h}h`):`${m}m`;
}
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function isToday() { return viewDate === todayKey(); }

// ── Header date ───────────────────────────────────────────────────────────────
function updateHeader() {
  const d = keyToDate(viewDate);
  document.getElementById('dateBig').textContent = `${d.getDate()} ${MONTHS[d.getMonth()]}`;
  document.getElementById('dateSub').textContent = `${d.getFullYear()} ${DAYS[d.getDay()]}요일`;
  const badge = document.getElementById('todayBadge');
  badge.innerHTML = isToday() ? '<span class="today-badge">TODAY</span>' : '';
}

// ── Timeline render ───────────────────────────────────────────────────────────
function renderTimeline() {
  const blocks = getCurrentBlocks();
  const sorted = [...blocks].sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
  const now = nowMin();
  const list = document.getElementById('blocksList');

  if (sorted.length === 0) {
    list.innerHTML = `<div class="empty-state">아직 일정이 없어요<br>+ 블록 추가로 시작해보세요</div>`;
    updateStats([]);
    updateFocus([], now);
    return;
  }

  list.innerHTML = sorted.map(b => {
    const s=timeToMin(b.start), e=timeToMin(b.end);
    const isActive = isToday() && !b.done && now>=s && now<e;
    const t = tagMap[b.tag] || tagMap.work;
    return `
      <div class="block-row${b.done?' is-done':''}${isActive?' is-active':''}" id="row-${b.id}">
        <div class="block-time">
          <span class="hour">${b.start}</span>
          <span>${b.end}</span>
        </div>
        <div class="block-content">
          <input type="checkbox" class="block-check" ${b.done?'checked':''} onchange="toggleDone('${b.id}')">
          <div class="block-body">
            <div class="block-title">${b.title}</div>
            <div class="block-meta">
              <span class="tag ${t.cls}">${t.label}</span>
              <span class="duration">${formatDuration(b.start,b.end)}</span>
            </div>
            ${renderActualTime(b)}
          </div>
          <div class="block-actions">
            <button class="action-btn edit" onclick="editBlock('${b.id}')" title="편집">✎</button>
            <button class="action-btn del" onclick="deleteBlock('${b.id}')" title="삭제">✕</button>
          </div>
        </div>
      </div>`;
  }).join('');

  updateStats(sorted);
  updateFocus(sorted, now);
}

function updateStats(sorted) {
  const total = sorted.length;
  const done = sorted.filter(b=>b.done).length;
  const focusMins = sorted.filter(b=>b.tag==='focus').reduce((a,b)=>a+Math.max(0,timeToMin(b.end)-timeToMin(b.start)),0);
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statLeft').textContent = total-done;
  document.getElementById('statFocus').textContent = focusMins>=60?`${Math.round(focusMins/60*10)/10}h`:focusMins+'m';
  const pct = total>0?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
}

function updateFocus(sorted, now) {
  if (!isToday()) {
    document.getElementById('focusLabel').textContent = '📅 과거 기록';
    document.getElementById('focusTitle').textContent = '다른 날짜 보는 중';
    document.getElementById('focusTime').textContent = viewDate;
    return;
  }
  const active = sorted.find(b=>!b.done&&now>=timeToMin(b.start)&&now<timeToMin(b.end));
  const upcoming = sorted.find(b=>!b.done&&timeToMin(b.start)>now);
  if (active) {
    document.getElementById('focusLabel').textContent = '▶ Now';
    document.getElementById('focusTitle').textContent = active.title;
    document.getElementById('focusTime').textContent = `${active.start} – ${active.end}`;
  } else if (upcoming) {
    document.getElementById('focusLabel').textContent = '▸ Next';
    document.getElementById('focusTitle').textContent = upcoming.title;
    document.getElementById('focusTime').textContent = `다음 · ${upcoming.start} – ${upcoming.end}`;
  } else if (sorted.length > 0) {
    document.getElementById('focusLabel').textContent = '✓ 완료';
    document.getElementById('focusTitle').textContent = '오늘 일정 모두 완료!';
    document.getElementById('focusTime').textContent = '';
  } else {
    document.getElementById('focusLabel').textContent = '▶ Now';
    document.getElementById('focusTitle').textContent = '–';
    document.getElementById('focusTime').textContent = '';
  }
}

function renderActualTime(b) {
  if (!b.actualStart || !b.actualEnd) return '';
  const planMins   = timeToMin(b.end) - timeToMin(b.start);
  const actualMins = timeToMin(b.actualEnd) - timeToMin(b.actualStart);
  const diff = actualMins - planMins;
  let diffStr = '', diffCls = '';
  if (diff > 0)       { diffStr = `+${diff}분`; diffCls = 'over'; }
  else if (diff < 0)  { diffStr = `${diff}분`;  diffCls = 'under'; }
  return `
    <div class="actual-time-row">
      <span class="actual-time-label">실제</span>
      <span class="actual-time-val">${b.actualStart} – ${b.actualEnd}</span>
      <span class="actual-time-diff ${diffCls}">${diffStr ? '(' + diffStr + ')' : '계획과 동일'}</span>
    </div>`;
}

// ── Block actions ─────────────────────────────────────────────────────────────
function toggleDone(id) {
  const blocks = getCurrentBlocks();
  const b = blocks.find(x=>x.id===id);
  if (b) b.done = !b.done;
  saveBlocks(blocks);
  renderTimeline();
  renderHistory();
}
function deleteBlock(id) {
  saveBlocks(getCurrentBlocks().filter(x=>x.id!==id));
  renderTimeline();
  renderHistory();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let editingId = null;

function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modalOverlay');
  const saveBtn = modal.querySelector('.btn-save');

  if (editingId) {
    // 편집 모드 — 기존 값 채우기
    const b = getCurrentBlocks().find(x => x.id === editingId);
    if (!b) return;
    document.getElementById('inpTitle').value = b.title;
    document.getElementById('inpStart').value = b.start;
    document.getElementById('inpEnd').value   = b.end;
    document.getElementById('inpTag').value   = b.tag;
    document.getElementById('inpActualStart').value = b.actualStart || '';
    document.getElementById('inpActualEnd').value   = b.actualEnd   || '';
    saveBtn.textContent = '수정하기';
    modal.querySelector('h3').textContent = '타임박스 수정';
  } else {
    // 추가 모드
    document.getElementById('inpTitle').value = '';
    document.getElementById('inpStart').value = '09:00';
    document.getElementById('inpEnd').value   = '10:00';
    document.getElementById('inpTag').value   = 'work';
    document.getElementById('inpActualStart').value = '';
    document.getElementById('inpActualEnd').value   = '';
    saveBtn.textContent = '추가하기';
    modal.querySelector('h3').textContent = '새 타임박스';
  }

  modal.classList.add('open');
  setTimeout(() => document.getElementById('inpTitle').focus(), 60);
}

function editBlock(id) { openModal(id); }

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveBlock() {
  const title = document.getElementById('inpTitle').value.trim();
  if (!title) { document.getElementById('inpTitle').focus(); return; }

  const blocks = getCurrentBlocks();

  const actualStart = document.getElementById('inpActualStart').value || null;
  const actualEnd   = document.getElementById('inpActualEnd').value   || null;

  if (editingId) {
    const b = blocks.find(x => x.id === editingId);
    if (b) {
      b.title       = title;
      b.start       = document.getElementById('inpStart').value;
      b.end         = document.getElementById('inpEnd').value;
      b.tag         = document.getElementById('inpTag').value;
      b.actualStart = actualStart;
      b.actualEnd   = actualEnd;
      // 실제 시간이 입력되면 자동 완료 처리
      if (actualStart && actualEnd) b.done = true;
    }
    saveBlocks(blocks);
    closeModal();
    renderTimeline();
    renderHistory();
    showToast('블록이 수정되었어요');
  } else {
    blocks.push({
      id:          String(nextId++),
      title,
      start:       document.getElementById('inpStart').value,
      end:         document.getElementById('inpEnd').value,
      tag:         document.getElementById('inpTag').value,
      done:        !!(actualStart && actualEnd),
      actualStart,
      actualEnd,
    });
    saveBlocks(blocks);
    closeModal();
    renderTimeline();
    renderHistory();
    showToast('블록이 추가되었어요');
  }
}
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveBlock();
});

// ── Notes & Mood ──────────────────────────────────────────────────────────────
function loadSidebarData() {
  const data = getDayData(viewDate);
  document.getElementById('notesArea').value = data.notes || '';
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  if (data.mood) {
    document.querySelectorAll('.mood-btn').forEach(b=>{ if(b.textContent===data.mood) b.classList.add('selected'); });
  }
}
function saveNotes() {
  const d = getDayData(viewDate);
  d.notes = document.getElementById('notesArea').value;
  setDayData(viewDate, d);
}
function setMood(btn, emoji) {
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const d = getDayData(viewDate);
  d.mood = emoji;
  setDayData(viewDate, d);
}

// ── History ───────────────────────────────────────────────────────────────────
let historyOpen = false;
function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('historyBody').classList.toggle('open', historyOpen);
  document.getElementById('historyToggle').classList.toggle('open', historyOpen);
  if (historyOpen) renderHistory();
}
function renderHistory() {
  const all = loadAll();
  const keys = Object.keys(all).filter(k => !isWeekend(keyToDate(k))).sort().reverse();
  const count = document.getElementById('historyCount');
  count.textContent = keys.length > 0 ? `(${keys.length}일)` : '';

  if (!historyOpen) return;
  const body = document.getElementById('historyBody');
  if (keys.length === 0) {
    body.innerHTML = '<div class="history-empty">아직 기록이 없어요</div>';
    return;
  }
  body.innerHTML = `<div class="history-grid">${keys.map(k=>{
    const d = all[k];
    const blocks = d.blocks || [];
    const total = blocks.length;
    const done = blocks.filter(b=>b.done).length;
    const pct = total>0?Math.round(done/total*100):0;
    const date = keyToDate(k);
    const moodIcon = d.mood || '';
    const isView = k===viewDate;
    return `
      <div class="history-day" onclick="jumpToDay('${k}')" style="${isView?'border-color:var(--accent);background:var(--accent-light)':''}">
        <div class="history-day-date">${k} ${DAYS[date.getDay()]} ${moodIcon}</div>
        <div class="history-day-title">${done}<span style="font-size:13px;color:var(--ink-faint);font-family:'DM Mono',monospace">/${total}</span></div>
        <div class="history-day-bar"><div class="history-day-fill" style="width:${pct}%"></div></div>
        <div class="history-day-pct">${pct}% 완료</div>
      </div>`;
  }).join('')}</div>`;
}
function jumpToDay(key) {
  viewDate = key;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Timer ─────────────────────────────────────────────────────────────────────
let timerDuration = 25 * 60; // 설정된 총 시간 (초)
let timerSec      = 25 * 60; // 남은 시간 (초)
let timerRunning  = false;
let timerInterval = null;

function setPreset(btn, minutes) {
  if (timerRunning) return; // 작동 중엔 변경 불가
  document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('timerCustom').value = minutes;
  timerDuration = minutes * 60;
  timerSec = timerDuration;
  updateTimerDisplay();
  updateTimerLabel();
}

function setCustom(val) {
  if (timerRunning) return;
  const mins = Math.max(1, Math.min(999, parseInt(val) || 1));
  document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
  timerDuration = mins * 60;
  timerSec = timerDuration;
  updateTimerDisplay();
  updateTimerLabel();
}

function updateTimerDisplay() {
  const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
  const s = (timerSec % 60).toString().padStart(2, '0');
  document.getElementById('timerDigits').innerHTML = `${m}<span>:${s}</span>`;
  // 남은 시간 비율로 숫자 색상 변화
  const ratio = timerSec / timerDuration;
  const el = document.getElementById('timerDigits');
  el.style.color = ratio < 0.2 ? 'var(--accent)' : 'var(--ink)';
}

function updateTimerLabel() {
  const mins = Math.round(timerDuration / 60);
  document.getElementById('timerLabel').textContent = `POMODORO · ${mins}MIN`;
}

function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 3번 짧게 울리는 알람음
    [0, 0.4, 0.8].forEach(offset => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + offset);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + offset + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + offset + 0.35);
      osc.start(ctx.currentTime + offset);
      osc.stop(ctx.currentTime + offset + 0.4);
    });
  } catch(e) {}
}

function toggleTimer() {
  timerRunning = !timerRunning;
  const btn = document.getElementById('timerBtn');
  btn.textContent = timerRunning ? 'PAUSE' : 'START';
  if (timerRunning) {
    // 입력 잠금
    document.getElementById('timerCustom').disabled = true;
    document.querySelectorAll('.timer-preset').forEach(b => b.style.pointerEvents = 'none');
    timerInterval = setInterval(() => {
      if (timerSec <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        btn.textContent = 'START';
        document.getElementById('timerCustom').disabled = false;
        document.querySelectorAll('.timer-preset').forEach(b => b.style.pointerEvents = '');
        playAlarm();
        showToast('🍅 포모도로 완료!');
        return;
      }
      timerSec--;
      updateTimerDisplay();
    }, 1000);
  } else {
    clearInterval(timerInterval);
    document.getElementById('timerCustom').disabled = false;
    document.querySelectorAll('.timer-preset').forEach(b => b.style.pointerEvents = '');
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSec = timerDuration;
  document.getElementById('timerBtn').textContent = 'START';
  document.getElementById('timerCustom').disabled = false;
  document.querySelectorAll('.timer-preset').forEach(b => b.style.pointerEvents = '');
  updateTimerDisplay();
}

// ── Export / Import ───────────────────────────────────────────────────────────
function exportJSON() {
  const all = loadAll();
  const json = JSON.stringify(all, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  const a = document.createElement('a');
  a.href = dataUri;
  a.download = `timebox-backup-${todayKey()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('백업 파일이 저장되었어요');
}
function importJSON(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const all = loadAll();
      // merge: imported data wins for each day
      Object.assign(all, data);
      saveAll(all);
      renderAll();
      showToast(`${Object.keys(data).length}일치 데이터를 불러왔어요`);
    } catch(err) { showToast('파일을 읽을 수 없어요'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderAll() {
  updateHeader();
  renderTimeline();
  loadSidebarData();
  renderHistory();
}

if (window._appReady) window._initApp();
